<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Mazo Premium - Vibras Positivas ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; text-align: center; padding: 20px; }
        h1 { color: #F37335; margin-bottom: 10px; }
        p.subtitle { opacity: 0.8; margin-bottom: 30px; }
        
        /* Contenedor de la Galería */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Estilo de cada tarjeta Premium (image_0.png style) */
        .card-item {
            width: 280px;
            height: 420px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            transition: transform 0.3s;
            margin: auto;
            background-size: cover;
            background-position: center;
        }
        
        /* Efecto al pasar el mouse */
        .card-item:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(243, 115, 53, 0.3); }

        /* Capa oscura para contraste del texto (image_0.png style) */
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 1; }
        
        /* Texto de la Frase */
        .card-text { 
            position: relative; z-index: 2; 
            font-weight: bold; font-size: 1.5rem; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); 
            line-height: 1.3;
        }
        
        /* Marca de Agua (image_0.png style) */
        .watermark { position: absolute; bottom: 10px; z-index: 2; font-size: 0.6rem; opacity: 0.7; }

        /* Botón de Descarga Individual */
        .btn-save { 
            margin-top: 20px; 
            background: #F37335; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            position: relative; z-index: 3; 
            transition: background 0.2s;
        }
        .btn-save:hover { background: #e0662d; }
    </style>
</head>
<body>

    <h1>¡Tu Mazo Premium está listo! ✨</h1>
    <p class="subtitle">He confirmado tu pago. Haz clic en el botón de cada tarjeta para descargarla con su mensaje de poder.</p>

    <div class="gallery" id="premium-gallery">
        </div>

    <div style="margin-top: 50px; font-size: 0.8rem; opacity: 0.6;">
        app desarrollada por vibras positivas (3117700431)
    </div>

    <script>
        // --- BASE DE DATOS AUTOMÁTICA DE FRASES PREMIUM ---
        const premiumPhrases = [
            "Soy un imán para la abundancia.", "Confía, todo está fluyendo a tu favor.", "Tu energía crea tu realidad.",
            "Hoy elijo ser mi mejor versión.", "Eres luz.", "Atraigo paz y prosperidad.",
            "Merezco todo lo bueno.", "Soy creador de mi realidad.", "Vivo en gratitud infinita.",
            "Cada día es una nueva oportunidad.", "Atraigo bendiciones.", "Soy fuerte, valiente y capaz.",
            "Mi futuro es brillante.", "Abraza tu poder interior.", "Eres suficiente.",
            "Atraigo amor y alegría.", "Mi paz es mi poder.", "Todo conspira a mi favor.",
            "Soy prosperidad en movimiento.", "Confío en mi intuición.", "El universo te cuida.",
            "Suelta lo que te pesa.", "Vibra alto y atraerás lo mejor.", "Hoy elijo la felicidad.",
            "Eres amor puro.", "Agradece y recibirás."
        ];

        // --- BASE DE DATOS DE IMÁGENES MÍSTICAS DE FONDO (Permiten descarga) ---
        const backgrounds = [
            'https://images.unsplash.com/photo-1506318264265-9900294c6373?auto=format&fit=crop&w=400&q=80', // Galaxia mística (image_0.png)
            'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80', // Cielo estrellado
            'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=400&q=80', // Mar tranquilo
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80'  // Montañas místicas
        ];

        const gallery = document.getElementById('premium-gallery');

        // --- LÓGICA: GENERAR LA GALERÍA INTERACTIVA ---
        for (let i = 0; i < premiumPhrases.length; i++) {
            // Crear el contenedor de la tarjeta
            const card = document.createElement('div');
            card.className = 'card-item';
            card.id = `card-premium-${i}`;
            
            // Asignar imagen de fondo aleatoria de la lista
            const bgUrl = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            card.style.backgroundImage = `url('${bgUrl}')`;
            
            // Estructura interna de la tarjeta (image_0.png style)
            card.innerHTML = `
                <div class="overlay"></div>
                <div class="card-text">"${premiumPhrases[i]}"</div>
                <div class="watermark">vibras positivas (3117700431)</div>
                <button class="btn-save" onclick="downloadSingleCard('card-premium-${i}')">📥 Descargar con Mensaje</button>
            `;
            gallery.appendChild(card);
        }

        // --- LÓGICA: GENERAR IMAGEN Y DESCARGAR ---
        function downloadSingleCard(cardId) {
            const cardElement = document.getElementById(cardId);
            const downloadBtn = cardElement.querySelector('.btn-save');

            // Feedback visual: Ocultar botón y mostrar "Cargando..."
            downloadBtn.style.display = 'none'; 
            
            // html2canvas fusiona el texto con el fondo y genera la imagen
            html2canvas(cardElement, { 
                scale: 3, // ALTA RESOLUCIÓN para el cliente
                useCORS: true, // Crucial para imágenes externas
                backgroundColor: null 
            }).then(canvas => {
                // Crear enlace de descarga
                const link = document.createElement('a');
                link.download = `VibraPremium-${cardId}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                // Restaurar el botón original
                downloadBtn.style.display = 'block';
            });
        }
    </script>
</body>
</html>
