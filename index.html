<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Positivas - Tu Experiencia Energética</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #9D50BB;
            --secondary: #F37335;
            --dark: #121212;
            
            /* --- DEFINICIÓN DE FONDOS VIBRANTES --- */
            /* Fondo 1: El Aura Original (image_2.png) */
            --bg-aura: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            
            /* Fondo 2: Fuego Solar (Naranja/Rojo con textura sutil) */
            --bg-fuego: linear-gradient(135deg, #FF512F 0%, #DD2476 100%);
            
            /* Fondo 3: Bosque Sanador (Verde/Azul profundo) */
            --bg-bosque: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        .app-header { text-align: center; margin-bottom: 20px; }
        .app-header h1 { color: var(--secondary); margin: 0; font-size: 1.8rem; }

        /* --- TARJETA REDISEÑADA CON FONDOS DINÁMICOS --- */
        #card-container {
            width: 330px;
            height: 480px;
            /* El fondo se maneja con la clase CSS activa */
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 30px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
            transition: background 0.5s ease, transform 0.3s ease;
            overflow: hidden;
        }

        /* Clases para cambiar el fondo */
        .card-bg-aura { background: var(--bg-aura); }
        .card-bg-fuego { background: var(--bg-fuego); }
        .card-bg-bosque { background: var(--bg-bosque); }

        /* Efecto de 'brillo' o textura overlay */
        #card-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWPAAn///v2PkQEBAQMCAQAQBQkB4f75fQAAAABJRU5ErkJggg=='); /* Patrón de micro-ruido para textura */
            opacity: 0.15;
            pointer-events: none;
        }

        .card-label { font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; opacity: 0.9; }
        
        #main-phrase { 
            font-size: 1.8rem; 
            font-weight: 800; 
            line-height: 1.3; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        #user-display-name {
            font-size: 1.1rem;
            font-style: italic;
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding-bottom: 5px;
            width: 90%;
            text-transform: uppercase;
            position: relative; z-index: 1;
        }

        .card-footer { font-size: 0.7rem; opacity: 0.8; position: relative; z-index: 1; }

        /* --- CONTROLES MÓVILES --- */
        .controls { width: 330px; margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }

        input#user-name {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #222;
            color: white;
            font-size: 1rem;
            text-align: center;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-refresh { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(157, 80, 187, 0.3); }
        .btn-download { background: var(--secondary); color: white; box-shadow: 0 4px 10px rgba(243, 115, 53, 0.3); }
        .btn:active { transform: scale(0.95); }

        /* --- SECCIÓN DE PAGO NEQUI --- */
        .payment-box {
            margin-top: 25px;
            width: 330px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .nequi-tag {
            background: #ff0055;
            color: white;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .buy-btn {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .buy-btn:hover {
            background: var(--secondary);
            color: white;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>Vibras Positivas</h1>
    </div>

    <div id="card-container" class="card-bg-aura">
        <div class="card-label">TU MENSAJE DE HOY:</div>
        <div id="main-phrase">"Confía en el proceso, lo que buscas te está buscando."</div>
        <div id="user-display-name">PARA: ALGUIEN ESPECIAL</div>
        <div class="card-footer">app desarrollada por vibras positivas (3117700431)</div>
    </div>

    <div class="controls">
        <input type="text" id="user-name" placeholder="Tu nombre aquí..." maxlength="20">
        
        <div class="btn-group">
            <button class="btn btn-refresh" onclick="newPhraseAndBackground()">🔄 Nueva</button>
            <button class="btn btn-download" onclick="downloadCard()">📥 Bajar PNG</button>
        </div>
    </div>

    <div class="payment-box">
        <span class="nequi-tag">NEQUI</span>
        <p style="margin: 10px 0 5px 0; font-weight: bold;">Mazo de 50 Tarjetas Premium</p>
        <p style="font-size: 0.9rem; opacity: 0.8;">Valor: $5 USD / Envía a: 3117700431</p>
        <button class="buy-btn" onclick="buyWhatsApp()">Comprar Colección Completa 🛍️</button>
    </div>

    <script>
        // --- BASE DE DATOS DE FONDOS ---
        const backgroundClasses = ['card-bg-aura', 'card-bg-fuego', 'card-bg-bosque'];

        // --- BASE DE DATOS DE FRASES (Sigue siendo expandible) ---
        const phrases = [
            "Confía en el proceso, lo que buscas te está buscando.",
            "No dejes para mañana el amor propio que puedes darte hoy.",
            "Tu vibración crea tu realidad, mantén la frecuencia alta.",
            "Eres el imán de tus propias bendiciones.",
            "Hoy es un gran día para agradecer lo que aún no llega.",
            "Tu luz es capaz de iluminar cualquier oscuridad.",
            "Suelta lo que pesa, ama lo que hay y agradece lo que viene.",
            "Eres más fuerte de lo que crees y más capaz de lo que imaginas.",
            "El universo siempre responde a tu energía.",
            "Cada paso que das con fe te acerca a tu milagro."
        ];

        // --- LÓGICA DE NOMBRE ---
        const nameInput = document.getElementById('user-name');
        const display = document.getElementById('user-display-name');
        
        nameInput.addEventListener('input', (e) => {
            display.innerText = e.target.value ? `PARA: ${e.target.value.toUpperCase()}` : "PARA: ALGUIEN ESPECIAL";
        });

        // --- LÓGICA DE CAMBIO DE FRASE Y FONDO ---
        let currentPhraseIndex = 0;
        let currentBackgroundIndex = 0;

        function newPhraseAndBackground() {
            const card = document.getElementById('card-container');
            const phraseElement = document.getElementById('main-phrase');
            
            // 1. Elegir nueva frase (aleatoria pero no la misma)
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * phrases.length);
            } while (newIndex === currentPhraseIndex);
            currentPhraseIndex = newIndex;

            // 2. Elegir nuevo fondo (secuencial)
            currentBackgroundIndex = (currentBackgroundIndex + 1) % backgroundClasses.length;
            const newBackgroundClass = backgroundClasses[currentBackgroundIndex];

            // 3. Aplicar cambios con animación suave
            // Pequeña animación de escala para la tarjeta
            card.style.transform = "scale(0.98)";
            
            // Animación de opacidad para el texto
            phraseElement.style.opacity = 0;

            setTimeout(() => {
                // Cambiar el texto
                phraseElement.innerText = `"${phrases[currentPhraseIndex]}"`;
                
                // Cambiar el fondo
                card.className = newBackgroundClass; // Reemplaza la clase de fondo antigua
                
                // Restaurar opacidad y escala
                phraseElement.style.opacity = 1;
                card.style.transform = "scale(1)";
            }, 300); // Pequeño retraso para la animación
        }

        // --- LÓGICA DE DESCARGA PNG ---
        function downloadCard() {
            const card = document.getElementById('card-container');
            
            // Feedback visual en el botón de descarga
            const downloadBtn = document.querySelector('.btn-download');
            downloadBtn.innerHTML = "<span>⏳</span> Generando...";
            downloadBtn.style.opacity = 0.7;

            html2canvas(card, { 
                scale: 3, // ALTA RESOLUCIÓN
                backgroundColor: null, // Mantiene el fondo de la página limpio
                useCORS: true // Para texturas externas si las hubiera
            }).then(canvas => {
                const link = document.createElement('a');
                // Nombre del archivo personalizado
                const userName = nameInput.value || 'Mensaje';
                link.download = `VibraPositiva-${userName}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                // Restaurar el botón
                downloadBtn.innerHTML = "<span>📥</span> Bajar PNG";
                downloadBtn.style.opacity = 1;
            });
        }

        // --- COMPRA POR WHATSAPP ---
        function buyWhatsApp() {
            // El mensaje está pre-escrito para que el cliente solo tenga que dar 'Enviar'
            const url = "https://wa.me/3117700431?text=Hola!%20Acabo%20de%20enviar%20el%20pago%20a%20Nequi%20por%20los%205%20dolares.%20Quiero%20mi%20mazo%20de%2050%20tarjetas%20Premium.";
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
