<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Vibras Positivas ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-violet: #9D50BB;
            --secondary-orange: #F37335;
            --text-dark: #333;
            --text-light: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Fondo oscuro para que la tarjeta resalte (como en Instagram) */
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: var(--text-light);
            min-height: 100vh;
        }

        /* Título de la App */
        .app-title {
            color: var(--secondary-orange);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .app-subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
            text-align: center;
        }

        /* --- CONTENEDOR DE LA TARJETA (El diseño de image_0.png) --- */
        #card-to-export {
            width: 350px; /* Ancho optimizado para Stories */
            height: 500px;
            /* El degradado original de tu tarjeta */
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            color: white; /* Color de texto original */
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
            /* Pequeña animación de entrada suave */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cabecera de la Tarjeta */
        .card-header {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* La Frase Principal */
        #main-phrase {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.3;
            margin-top: -20px; /* Centrado vertical visual */
        }

        /* El Nombre del Usuario */
        #display-name {
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0.9;
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding-bottom: 10px;
            width: 80%;
        }

        /* Pie de página con tus datos de contacto */
        .card-footer {
            font-size: 0.75rem;
            opacity: 0.7;
            text-transform: lowercase;
        }

        /* --- CONTROLES DE LA APP (Abajo de la tarjeta) --- */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 350px;
        }

        /* Input del Nombre */
        input#name-input {
            padding: 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: border-color 0.3s;
        }
        input#name-input:focus {
            outline: none;
            border-color: var(--secondary-orange);
            background: rgba(255,255,255,0.15);
        }

        /* Botones Principales */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.97); }

        /* Botón 1: Nuevo Mensaje */
        #new-message-btn {
            background: var(--primary-violet);
            color: white;
            box-shadow: 0 4px 15px rgba(157, 80, 187, 0.4);
        }

        /* Botón 2: Descargar (El más llamativo) */
        #download-btn {
            background: var(--secondary-orange);
            color: white;
            box-shadow: 0 4px 15px rgba(243, 115, 53, 0.4);
        }

        /* --- SECCIÓN DE VENTA (La Conversión) --- */
        .upsell-container {
            margin-top: 25px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            width: 350px;
            box-sizing: border-box;
        }

        .upsell-title {
            font-size: 1rem;
            color: #fbc2eb; /* Color suave de la tarjeta */
            margin-bottom: 10px;
        }

        #buy-collection-btn {
            background: transparent;
            border: 2px solid var(--secondary-orange);
            color: var(--secondary-orange);
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        #buy-collection-btn:hover {
            background: var(--secondary-orange);
            color: white;
        }

    </style>
</head>
<body>

    <div class="app-title">Vibras Positivas ✨</div>
    <div class="app-subtitle">Recibe tu mensaje de hoy y eleva tu energía.</div>

    <div id="card-to-export">
        <div class="card-header">TU MENSAJE DE HOY:</div>
        <p id="main-phrase">"Confía en el proceso, lo que buscas te está buscando."</p>
        <div id="display-name">Para: Alguien Especial</div>
        <div class="card-footer">app desarrollada por vibras positivas (3117700431)</div>
    </div>

    <div class="controls">
        <input type="text" id="name-input" placeholder="Escribe tu nombre aquí..." maxlength="20">
        
        <div class="btn-group">
            <button class="btn" id="new-message-btn">
                <span>🔄</span> Nuevo Mensaje
            </button>
            <button class="btn" id="download-btn">
                <span>📥</span> Descargar PNG
            </button>
        </div>
    </div>

    <div class="upsell-container">
        <div class="upsell-title">✨ ¿Deseas más guía? ✨</div>
        <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;">Consigue nuestro mazo exclusivo de 50 tarjetas digitales.</p>
        <button id="buy-collection-btn" onclick="window.location.href='https://wa.me/3117700431?text=Hola!%20Quiero%20la%20coleccion%20premium%20de%2050%20tarjetas'">Comprar Colección Completa 🛍️</button>
    </div>

    <script>
        // --- 1. Base de Datos de Frases ---
        const phrases = [
            "Confía en el proceso, lo que buscas te está buscando.",
            "Tu energía crea tu realidad. Elige vibrar alto hoy.",
            "Eres el imán de tus propias bendiciones. Visualízalo.",
            "Todo lo que necesitas ya está dentro de ti. Solo cree.",
            "Hoy es un buen día para empezar de nuevo con gratitud.",
            "Tu única competencia eres tú mismo de ayer. Supérate.",
            "El universo conspira a tu favor. Mantén la fe.",
            "Abraza la incertidumbre, ahí es donde vive la magia.",
            "No dejes para mañana el amor propio que puedes darte hoy.",
            "Eres luz. No permitas que nadie apague tu brillo."
        ];

        let currentPhraseIndex = 0;

        // --- 2. Referencias a elementos del DOM ---
        const nameInput = document.getElementById('name-input');
        const displayName = document.getElementById('display-name');
        const mainPhrase = document.getElementById('main-phrase');
        const newMessageBtn = document.getElementById('new-message-btn');
        const downloadBtn = document.getElementById('download-btn');

        // --- 3. Lógica: Actualización del nombre ---
        nameInput.addEventListener('input', (e) => {
            // Ponemos el nombre en mayúsculas como en el diseño original
            displayName.innerText = e.target.value ? `Para: ${e.target.value.toUpperCase()}` : "Para: Alguien Especial";
        });

        // --- 4. Lógica: Cambiar mensaje aleatoriamente ---
        newMessageBtn.addEventListener('click', () => {
            // Evitamos que salga la misma frase dos veces seguidas
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * phrases.length);
            } while (newIndex === currentPhraseIndex);
            
            currentPhraseIndex = newIndex;
            
            // Animación suave de cambio de texto
            mainPhrase.style.opacity = 0;
            setTimeout(() => {
                mainPhrase.innerText = `"${phrases[currentPhraseIndex]}"`;
                mainPhrase.style.opacity = 1;
            }, 300);
        });

        // --- 5. Lógica: Descarga de Imagen (MVP Viral) ---
        downloadBtn.addEventListener('click', () => {
            const card = document.getElementById('card-to-export');
            
            // Texto del botón temporal para feedback de carga
            const originalBtnText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = "<span>⏳</span> Generando...";
            downloadBtn.style.opacity = 0.7;

            html2canvas(card, {
                scale: 3, // ALTA RESOLUCIÓN para compartir
                backgroundColor: null, // Mantenemos el fondo transparente fuera de la tarjeta
                useCORS: true // Para imágenes externas si las hubiera
            }).then(canvas => {
                // Creamos el enlace de descarga
                const link = document.createElement('a');
                // Nombre del archivo personalizado
                const fileName = `VibrasPositivas-${nameInput.value || 'Mensaje'}`;
                link.download = `${fileName}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                // Restauramos el botón
                downloadBtn.innerHTML = originalBtnText;
                downloadBtn.style.opacity = 1;
            });
        });
    </script>

</body>
</html>
