<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Positivas ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; }
        #card-capture { width: 330px; height: 480px; border-radius: 25px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 30px; text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; background-size: cover; background-position: center; transition: background-image 0.5s ease; }
        #card-capture::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1; }
        .content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        #main-phrase { font-size: 1.8rem; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        #user-display-name { font-size: 1.1rem; font-style: italic; border-bottom: 1px solid rgba(255,255,255,0.4); text-transform: uppercase; }
        .controls { width: 330px; margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #222; color: white; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .btn-refresh { background: #9D50BB; color: white; }
        .btn-download { background: #F37335; color: white; }
        .payment-box { margin-top: 25px; width: 330px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <h2 style="color:#F37335;">Vibras Positivas ✨</h2>
    <div id="card-capture" style="background-image: url('https://images.unsplash.com/photo-1506318264265-9900294c6373?auto=format&fit=crop&w=400&q=80');">
        <div class="content">
            <div style="font-weight: bold;">TU MENSAJE DE HOY:</div>
            <div id="main-phrase">"Confía en el proceso, lo que buscas te está buscando."</div>
            <div id="user-display-name">PARA: ALGUIEN ESPECIAL</div>
            <div style="font-size: 0.7rem;">vibras positivas (3117700431)</div>
        </div>
    </div>
    <div class="controls">
        <input type="text" id="user-name" placeholder="Tu nombre aquí...">
        <div class="btn-group">
            <button class="btn btn-refresh" onclick="newVibe()">🔄 Nueva</button>
            <button class="btn btn-download" onclick="downloadCard()">📥 Bajar PNG</button>
        </div>
    </div>
    <div class="payment-box">
        <p><b>Mazo de 26 Tarjetas Paisajes</b><br>Valor: $3 USD / Nequi: 3117700431</p>
        <button style="background:#F37335; color:white; border:none; padding:12px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%;" onclick="window.open('https://wa.me/3117700431?text=Hola!%20Ya%20pagué%20los%203%20dólares%20por%20las%2026%20tarjetas')">Comprar Mazo 🛍️</button>
    </div>
    <script>
        const bgs = ['https://images.unsplash.com/photo-1506318264265-9900294c6373?w=400','https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400','https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400'];
        const phrases = ["Confía en el proceso.", "Tu energía crea tu realidad.", "Eres luz.", "El universo conspira a tu favor."];
        const nameInput = document.getElementById('user-name');
        nameInput.addEventListener('input', (e) => { document.getElementById('user-display-name').innerText = "PARA: " + e.target.value.toUpperCase(); });
        function newVibe() {
            document.getElementById('card-capture').style.backgroundImage = `url('${bgs[Math.floor(Math.random()*bgs.length)]}')`;
            document.getElementById('main-phrase').innerText = `"${phrases[Math.floor(Math.random()*phrases.length)]}"`;
        }
        function downloadCard() {
            html2canvas(document.getElementById('card-capture'), { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = "VibraPositiva.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
