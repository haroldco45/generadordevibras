<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Positivas - App Viral</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0; padding: 20px;
        }

        /* TARJETA CON IMAGEN DE FONDO */
        #card-container {
            width: 330px;
            height: 480px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }

        /* Capa oscura sobre la imagen para que el texto se lea bien */
        #card-container::before {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.3); /* Ajusta este valor si quieres más o menos brillo */
            z-index: 1;
        }

        .content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

        #main-phrase { font-size: 1.8rem; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        #user-display-name { font-size: 1.1rem; font-style: italic; border-bottom: 1px solid white; text-transform: uppercase; padding-bottom: 5px; }
        .footer-text { font-size: 0.7rem; opacity: 0.9; }

        /* CONTROLES */
        .controls { width: 330px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 15px; border-radius: 10px; border: none; background: #222; color: white; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .btn-new { background: #9D50BB; color: white; }
        .btn-down { background: #F37335; color: white; }

        /* SECCIÓN PAGO */
        .payment-box { margin-top: 20px; width: 330px; background: #1a1a1a; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .buy-btn { background: transparent; border: 2px solid #F37335; color: #F37335; width: 100%; padding: 12px; border-radius: 50px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="color:#F37335">Vibras Positivas ✨</h2>

    <div id="card-container" style="background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80');">
        <div class="content">
            <div style="font-weight: bold; opacity: 0.9;">TU MENSAJE DE HOY:</div>
            <div id="main-phrase">"Confía en el proceso, lo que buscas te está buscando."</div>
            <div id="user-display-name">PARA: ALGUIEN ESPECIAL</div>
            <div class="footer-text">app desarrollada por vibras positivas (3117700431)</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="user-name" placeholder="Tu nombre aquí..." maxlength="20">
        <div class="btn-group">
            <button class="btn-new" onclick="update()">🔄 Nueva</button>
            <button class="btn-down" onclick="download()">📥 Bajar PNG</button>
        </div>
    </div>

    <div class="payment-box">
        <div style="background:#ff0055; display:inline; padding:2px 8px; border-radius:5px; font-size:0.8rem;">NEQUI</div>
        <p><b>Mazo 50 Tarjetas Premium</b><br>Valor: $5 USD / Envía a: 3117700431</p>
        <button class="buy-btn" onclick="buy()">Comprar Colección Completa 🛍️</button>
    </div>

    <script>
        const images = [
            'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80', // Galaxia
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80', // Montañas
            'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=400&q=80', // Mar
            'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=400&q=80'  // Paisaje
        ];
        const phrases = ["Tu energía atrae lo que piensas.", "Eres un ser de luz infinito.", "Hoy el universo conspira a tu favor.", "Sigue tu intuición, nunca falla."];

        const nameInput = document.getElementById('user-name');
        nameInput.addEventListener('input', () => {
            document.getElementById('user-display-name').innerText = "PARA: " + nameInput.value.toUpperCase();
        });

        function update() {
            const card = document.getElementById('card-container');
            const phrase = document.getElementById('main-phrase');
            card.style.backgroundImage = `url('${images[Math.floor(Math.random()*images.length)]}')`;
            phrase.innerText = `"${phrases[Math.floor(Math.random()*phrases.length)]}"`;
        }

        function download() {
            html2canvas(document.getElementById('card-container')).then(canvas => {
                const a = document.createElement('a');
                a.download = "MiVibraPositiva.png";
                a.href = canvas.toDataURL();
                a.click();
            });
        }

        function buy() {
            window.open("https://wa.me/3117700431?text=Hola! Ya pagué los 5 USD a Nequi. Envíame el mazo de 50 tarjetas.");
        }
    </script>
</body>
</html>
